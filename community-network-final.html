<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Food Facts — Réseau communautaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  :root {
    --paper: #FAF7F2;
    --paper-2: #F2EDE2;
    --paper-3: #EDE6D5;
    --ink: #1F2418;
    --ink-soft: #3A3F32;
    --forest: #2D4A2B;
    --moss: #5A7A4E;
    --terracotta: #C8553D;
    --terracotta-soft: #E58E78;
    --ochre: #D4A574;
    --plum: #6B3447;
    --rule: #DDD5C2;
    --rule-soft: #E8E2D5;
    --mastodon: #6364FF;
    --bluesky: #0085FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }

  /* ───── Header ───── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    position: sticky; top: 0;
    z-index: 600;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--forest);
    border-radius: 7px;
    display: grid; place-items: center;
    color: var(--paper);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 900;
    font-size: 18px;
    transform: translateY(3px);
  }
  .brand h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 500;
    font-style: italic;
    font-size: 22px;
    letter-spacing: -.5px;
  }
  .brand small {
    display: block;
    font-style: normal;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--moss);
    margin-top: -2px;
  }
  .view-toggle {
    display: flex;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 3px;
  }
  .view-toggle a, .view-toggle button {
    background: transparent;
    border: none;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: var(--moss);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .view-toggle a[aria-current="page"], .view-toggle button.active { background: var(--ink); color: var(--paper); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .me-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--paper-2);
    padding: 5px 12px 5px 5px;
    border-radius: 999px;
    cursor: pointer;
  }
  .me-chip:hover { background: var(--paper-3); }
  .me-chip .av {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--paper);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 12px;
    display: grid; place-items: center;
  }
  .me-chip span { font-size: 12.5px; font-weight: 600; }

  /* ───── Layout ───── */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    height: calc(100vh - 57px);
  }
  nav.left {
    border-right: 1px solid var(--rule);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    font-size: 14px;
    font-weight: 500;
    position: relative;
  }
  .nav-item:hover { background: var(--paper-2); }
  .nav-item.active {
    background: var(--ink);
    color: var(--paper);
    font-weight: 700;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--terracotta);
    color: var(--paper);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .nav-item.active .badge { background: var(--ochre); color: var(--ink); }

  .nav-divider { height: 1px; background: var(--rule); margin: 12px 8px; }

  .nav-mini-profile {
    margin-top: auto;
    padding: 12px;
    background: var(--paper-2);
    border-radius: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .nav-mini-profile .av {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--paper);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 14px;
    display: grid; place-items: center;
  }
  .nav-mini-profile .meta { font-size: 11px; min-width: 0; }
  .nav-mini-profile .meta .n { font-weight: 700; font-size: 13px; color: var(--ink); }
  .nav-mini-profile .meta .h { color: var(--moss); }

  /* Center */
  main.center {
    overflow-y: auto;
    border-right: 1px solid var(--rule);
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

  .view-header {
    padding: 18px 28px 12px;
    border-bottom: 1px solid var(--rule);
    background: rgba(250,247,242,.95);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .view-header h2 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -.5px;
  }
  .view-header .sub {
    font-size: 12px;
    color: var(--moss);
    margin-top: 2px;
  }

  /* Right rail */
  aside.right {
    overflow-y: auto;
    padding: 18px 18px 28px;
  }
  aside.right::-webkit-scrollbar { width: 4px; }
  aside.right::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  /* ───── Composer ───── */
  .composer {
    padding: 20px 28px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 14px;
  }
  .composer .av {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--paper);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 16px;
    display: grid; place-items: center;
    flex-shrink: 0;
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--rule);
  }
  .composer-body { flex: 1; min-width: 0; }
  .composer textarea {
    width: 100%;
    border: none;
    background: transparent;
    resize: none;
    outline: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    min-height: 60px;
    padding: 6px 0;
  }
  .composer textarea::placeholder { color: var(--moss); }
  .composer-tools {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 10px;
    border-top: 1px solid var(--rule-soft);
    flex-wrap: wrap;
  }
  .composer-type {
    display: flex;
    gap: 4px;
  }
  .type-btn {
    background: var(--paper-2);
    border: none;
    width: 32px; height: 32px;
    border-radius: 7px;
    color: var(--moss);
    display: grid;
    place-items: center;
    transition: all .15s;
  }
  .type-btn:hover { background: var(--paper-3); color: var(--ink); }
  .type-btn.active { background: var(--forest); color: var(--paper); }
  .type-btn svg { width: 15px; height: 15px; }
  .composer-end {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .char-count {
    font-size: 12px;
    color: var(--moss);
    font-variant-numeric: tabular-nums;
  }
  .char-count.warn { color: var(--terracotta); font-weight: 600; }
  .btn-post {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    transition: all .15s;
  }
  .btn-post:hover:not(:disabled) { background: var(--terracotta); transform: translateY(-1px); }
  .btn-post:disabled { opacity: .4; cursor: not-allowed; }

  /* ───── Post ───── */
  .post {
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: background .12s;
    animation: slideIn .35s ease-out;
  }
  .post:hover { background: rgba(242,237,226,.4); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .post .av {
    width: 44px; height: 44px;
    border-radius: 50%;
    color: var(--ink);
    display: grid;
    place-items: center;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 1px var(--rule);
  }
  .post-body { flex: 1; min-width: 0; }
  .post-head {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .post-name { font-weight: 700; font-size: 14px; }
  .post-name:hover { color: var(--terracotta); }
  .post-handle { font-size: 12px; color: var(--moss); }
  .post-time { font-size: 12px; color: var(--moss); margin-left: auto; }
  .post-time::before { content: '· '; }
  .post-pin {
    background: var(--paper-2);
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--moss);
  }
  .post-pin.question { background: #ECE1EF; color: var(--plum); }
  .post-pin.event { background: #FCEDE6; color: var(--terracotta); }
  .post-pin.poll { background: #ECF5E3; color: var(--forest); }
  .post-pin.activity { background: var(--paper-2); color: var(--moss); }

  .post-content {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 10px;
  }
  .post-content .tag {
    color: var(--terracotta);
    font-weight: 600;
    cursor: pointer;
  }
  .post-content .tag:hover { text-decoration: underline; }
  .post-content .mention {
    color: var(--forest);
    font-weight: 600;
    cursor: pointer;
  }

  /* Embed (product / activity card) */
  .embed {
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 12px 14px;
    background: var(--paper-2);
    border-left: 3px solid var(--ochre);
    margin-bottom: 10px;
    font-size: 12.5px;
  }
  .embed.product {
    border-left-color: var(--forest);
  }
  .embed-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 4px;
  }
  .embed-title {
    font-weight: 700;
    font-size: 13.5px;
    color: var(--ink);
  }
  .embed-items {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .embed-pill {
    background: var(--paper);
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11.5px;
    border: 1px solid var(--rule-soft);
  }
  .embed-meta {
    margin-top: 8px;
    font-size: 11px;
    color: var(--moss);
  }

  /* Poll */
  .poll-options { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }
  .poll-opt {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 13px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .poll-opt:hover { background: var(--paper-3); }
  .poll-opt.voted::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--forest);
    opacity: .15;
    width: var(--pct, 0%);
  }
  .poll-opt-text { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: center; }
  .poll-opt .pct { font-weight: 700; color: var(--forest); }
  .poll-total { font-size: 11px; color: var(--moss); margin-top: 6px; }

  /* Actions */
  .post-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 6px;
  }
  .pa-btn {
    background: none;
    border: none;
    color: var(--moss);
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 6px;
    transition: all .15s;
  }
  .pa-btn:hover { background: var(--paper-2); color: var(--ink); }
  .pa-btn.liked { color: var(--terracotta); }
  .pa-btn.boosted { color: var(--forest); }
  .pa-btn svg { width: 14px; height: 14px; }
  .pa-btn .count { font-variant-numeric: tabular-nums; }
  .pa-btn.fed-btn {
    margin-left: auto;
    background: linear-gradient(135deg, var(--mastodon) 0%, var(--bluesky) 100%);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 4px 10px;
  }
  .pa-btn.fed-btn:hover { transform: translateY(-1px); color: white; background: linear-gradient(135deg, var(--mastodon) 0%, var(--bluesky) 100%); }

  /* Comments */
  .comments {
    border-top: 1px solid var(--rule-soft);
    margin-top: 10px;
    padding-top: 10px;
    display: none;
  }
  .comments.open { display: block; }
  .comment {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--rule-soft);
  }
  .comment:last-of-type { border-bottom: none; }
  .comment .av {
    width: 30px; height: 30px;
    font-size: 11px;
    flex-shrink: 0;
  }
  .comment-body { flex: 1; min-width: 0; }
  .comment-head {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 2px;
  }
  .comment-name { font-weight: 700; font-size: 12.5px; }
  .comment-time { font-size: 11px; color: var(--moss); margin-left: auto; }
  .comment-content {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink);
  }
  .comment-input {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
  }
  .comment-input input {
    flex: 1;
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 7px 12px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .comment-input input:focus { border-color: var(--forest); }
  .comment-input button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  /* ───── Right rail cards ───── */
  .card {
    background: var(--paper-2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 10px;
  }

  .trending { display: flex; flex-direction: column; gap: 2px; }
  .trend {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
  }
  .trend:hover { background: var(--paper); }
  .trend-tag {
    color: var(--terracotta);
    font-weight: 700;
    font-size: 13.5px;
  }
  .trend-meta {
    font-size: 11px;
    color: var(--moss);
    margin-top: 1px;
  }

  .suggest-mini {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--rule-soft);
  }
  .suggest-mini:last-of-type { border-bottom: none; }
  .suggest-mini .av {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
  }
  .suggest-mini .info { flex: 1; min-width: 0; }
  .suggest-mini .nm { font-weight: 700; font-size: 12.5px; cursor: pointer; }
  .suggest-mini .nm:hover { color: var(--terracotta); }
  .suggest-mini .role { font-size: 11px; color: var(--moss); }
  .mini-follow {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .mini-follow.following {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
  }

  .fed-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .fed-card::before {
    content: '';
    position: absolute;
    inset: -50% -20% auto auto;
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--terracotta) 0%, transparent 60%);
    opacity: .3;
    pointer-events: none;
  }
  .fed-card .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.8px;
    color: var(--ochre);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .fed-card h3 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 500;
    font-style: italic;
    font-size: 19px;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .fed-card p {
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--paper-2);
    margin-bottom: 12px;
  }
  .fed-handle {
    background: rgba(255,255,255,.08);
    border: 1px dashed rgba(255,255,255,.25);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 10.5px;
    color: var(--ochre);
    margin-bottom: 10px;
    cursor: pointer;
    font-family: 'SF Mono',Menlo,monospace;
  }
  .fed-handle:hover { background: rgba(255,255,255,.14); }
  .fed-cta {
    background: var(--terracotta);
    color: var(--paper);
    border: none;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  /* ───── Explorer ───── */
  .explorer-search {
    padding: 20px 28px;
    border-bottom: 1px solid var(--rule);
  }
  .explorer-search input {
    width: 100%;
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 10px 16px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .explorer-section { padding: 18px 28px; border-bottom: 1px solid var(--rule); }
  .explorer-h {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-style: italic;
    font-size: 19px;
    margin-bottom: 12px;
  }
  .topics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .topic-card {
    background: var(--paper-2);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    background: var(--paper-3);
    transform: translateY(-1px);
  }
  .topic-card .t {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .topic-card .m {
    font-size: 11.5px;
    color: var(--moss);
  }
  .topic-card .tag {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 10px;
    background: var(--terracotta);
    color: var(--paper);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
  }

  /* ───── Notifications ───── */
  .notif-list { padding: 0; }
  .notif {
    padding: 14px 28px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 14px;
    cursor: pointer;
    align-items: flex-start;
  }
  .notif.unread { background: rgba(212,165,116,.08); }
  .notif:hover { background: rgba(242,237,226,.6); }
  .notif-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE)) || {};
    State.posts = s.posts || [...SEED_POSTS];
    State.comments = s.comments || { ...SEED_COMMENTS };
    State.likes = new Set(s.likes || []);
    State.boosts = new Set(s.boosts || []);
    State.follows = new Set(s.follows || ['stephane','olivia']);
    State.notifications = s.notifications || [...SEED_NOTIFS];
  } catch(e) {
    State.posts = [...SEED_POSTS];
    State.comments = { ...SEED_COMMENTS };
    State.notifications = [...SEED_NOTIFS];
    State.follows = new Set(['stephane','olivia']);
  }
}
function saveState() {
  localStorage.setItem(STORAGE, JSON.stringify({
    posts: State.posts,
    comments: State.comments,
    likes: [...State.likes],
    boosts: [...State.boosts],
    follows: [...State.follows],
    notifications: State.notifications
  }));
}

/* ════════════════════════════════════════════════════════════
   UTILS
   ════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeAgo(min) {
  if (min < 1) return "à l'instant";
  if (min < 60) return `${min}min`;
  if (min < 1440) return `${Math.round(min/60)}h`;
  if (min < 10080) return `${Math.round(min/1440)}j`;
  return `${Math.round(min/10080)}sem`;
}
function initials(name) {
  return name.split(/\s+/).map(s=>s[0]).slice(0,2).join('').toUpperCase();
}
function renderRichText(text) {
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  html = html.replace(/\*(.+?)\*/g, '<i>$1</i>');
  html = html.replace(/#(\w+)/g, '<span class="tag" data-tag="$1">#$1</span>');
  html = html.replace(/@(\w+)/g, '<span class="mention" data-mention="$1">@$1</span>');
  return html;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

function setView(v, params = {}) {
  State.view = v;
  if (params.profile) State.selectedProfile = params.profile;
  if (params.hashtag) State.selectedHashtag = params.hashtag; else State.selectedHashtag = null;

  // nav active state
  document.querySelectorAll('nav.left .nav-item[data-view]').forEach(n => {
    n.classList.toggle('active', n.dataset.view === v);
  });

  render();
}

function render() {
  const main = document.getElementById('main-content');
  const rail = document.getElementById('right-rail');

  if      (State.view === 'feed')          { main.innerHTML = renderFeed();          rail.innerHTML = renderRail(); }
  else if (State.view === 'explorer')      { main.innerHTML = renderExplorer();      rail.innerHTML = renderRail(); }
  else if (State.view === 'notifications') { main.innerHTML = renderNotifications(); rail.innerHTML = renderRail(); }
  else if (State.view === 'messages')      { main.innerHTML = renderMessages();      rail.innerHTML = ''; }
  else if (State.view === 'profile')       { main.innerHTML = renderProfile(ME);     rail.innerHTML = renderRail(); }
  else if (State.view === 'profile-other') { main.innerHTML = renderProfile(State.selectedProfile); rail.innerHTML = renderRail(); }

  wireInteractions();
  main.scrollTop = 0;
}

function renderPost(p) {
  const author = CONTRIBUTORS[p.author];
  if (!author) return '';

  const liked   = State.likes.has(p.id);
  const boosted = State.boosts.has(p.id);
  const totalLikes  = (p.likes || 0)  + (liked ? 1 : 0);
  const totalBoosts = (p.boosts || 0) + (boosted ? 1 : 0);
  const comments = State.comments[p.id] || [];
  const commentsOpen = State.openComments.has(p.id);

  const pinClass  = p.type;
  const pinLabels = { thought:'Pensée', question:'Question', photo:'Média', event:'Événement', poll:'Sondage', activity:'Activité', announce:'Annonce', translation:'Traduction', achievement:'Jalon' };

  let embedHtml = '';
  if (p.embed?.type === 'product') {
    embedHtml = `
      <div class="embed product">
        <div class="embed-label">${escapeHtml(p.embed.meta || 'Produits ajoutés')}</div>
        <div class="embed-items">${(p.embed.items||[]).map(i => `<span class="embed-pill">${escapeHtml(i)}</span>`).join('')}</div>
      </div>
    `;
  } else if (p.embed?.type === 'event') {
    embedHtml = `
      <div class="embed">
        <div class="embed-label">⌚ Événement local</div>
        <div class="embed-title">${escapeHtml(p.embed.title)}</div>
        <div class="embed-meta">${escapeHtml(p.embed.meta)}</div>
      </div>
    `;
  }

  let pollHtml = '';
  if (p.poll) {
    pollHtml = `
      <div class="poll-options">
        ${p.poll.options.map((opt, i) => {
          const pct = Math.round((opt.v / p.poll.total) * 100);
          return `
            <div class="poll-opt voted" style="--pct:${pct}%;" onclick="event.stopPropagation()">
              <div class="poll-opt-text">
                <span>${escapeHtml(opt.t)}</span>
                <span class="pct">${pct}%</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="poll-total">${p.poll.total} votes</div>
    `;
  }

  let commentsHtml = '';
  if (comments.length || commentsOpen) {
    commentsHtml = `
      <div class="comments ${commentsOpen ? 'open' : ''}">
        ${comments.map(c => {
          const cau = CONTRIBUTORS[c.author];
          if (!cau) return '';
          return `
            <div class="comment">
              <div class="av" style="background:${cau.avColor};color:#FAF7F2;">${initials(cau.name)}</div>
              <div class="comment-body">
                <div class="comment-head">
                  <span class="comment-name post-name" data-profile="${c.author}">${escapeHtml(cau.name)}</span>
                  <span class="comment-time">${timeAgo(c.minutesAgo)}</span>
                </div>
                <div class="comment-content">${renderRichText(c.content)}</div>
              </div>
            </div>
          `;
        }).join('')}
        <div class="comment-input" onclick="event.stopPropagation()">
          <input type="text" placeholder="Répondre à ${escapeHtml(author.name)}…" data-post-id="${p.id}" class="reply-input">
          <button class="reply-btn" data-post-id="${p.id}">Envoyer</button>
        </div>
      </div>
    `;
  }

  return `
    <article class="post" data-post-id="${p.id}">
      <div class="av" style="background:${author.avColor};color:#FAF7F2;">${initials(author.name)}</div>
      <div class="post-body">
        <div class="post-head">
          <span class="post-name" data-profile="${p.author}">${escapeHtml(author.name)}</span>
          <span class="post-handle">@${p.author}</span>
          <span class="post-pin ${pinClass}">${pinLabels[p.type] || 'Post'}</span>
          <span class="post-time">${timeAgo(p.minutesAgo)}</span>
        </div>
        <div class="post-content">${renderRichText(p.content)}</div>
        ${embedHtml}
        ${pollHtml}
        <div class="post-actions">
          <button class="pa-btn" data-act="comment" data-id="${p.id}">${ICN.reply}<span class="count">${comments.length}</span></button>
          <button class="pa-btn ${boosted?'boosted':''}" data-act="boost" data-id="${p.id}">${ICN.boost}<span class="count">${totalBoosts}</span></button>
          <button class="pa-btn ${liked?'liked':''}" data-act="like" data-id="${p.id}">${liked ? ICN.heartF : ICN.heart}<span class="count">${totalLikes}</span></button>
          <button class="pa-btn fed-btn" data-act="fed" data-id="${p.id}">↗ Fediverse</button>
        </div>
        ${commentsHtml}
      </div>
    </article>
  `;
}

          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════
   MESSAGES VIEW
   ════════════════════════════════════════════════════════════ */
function renderMessages() {
  const conv = State.selectedDM;
  const messages = SEED_DMS[conv] || [];
  const partner = CONTRIBUTORS[conv];

  return `
    <div class="view-header" style="padding:14px 20px;">
      <h2 style="font-size:20px;">Messages</h2>
    </div>
    <div class="messages-layout">
      <div class="conv-list">
        ${Object.keys(SEED_DMS).map(k => {
          const c = CONTRIBUTORS[k];
          const last = SEED_DMS[k][SEED_DMS[k].length-1];
          return `
            <div class="conv-item ${k===conv?'active':''}" data-dm="${k}">
              <div class="av" style="background:${c.avColor};color:#FAF7F2;">${initials(c.name)}</div>
              <div class="info">
                <div class="n">${escapeHtml(c.name)}</div>
                <div class="last">${escapeHtml(last.text.slice(0,40))}…</div>
              </div>
              <div class="t">${timeAgo(last.minutesAgo)}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="conv-view">
        <div class="conv-header">
          <div class="av" style="width:36px;height:36px;border-radius:50%;background:${partner.avColor};color:#FAF7F2;display:grid;place-items:center;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;">${initials(partner.name)}</div>
          <div>
            <div style="font-weight:700;font-size:14px;">${escapeHtml(partner.name)}</div>
            <div style="font-size:11px;color:var(--moss);">@${conv} · ${escapeHtml(partner.city)}</div>
          </div>
          <button class="mini-follow ${State.follows.has(conv)?'following':''}" data-follow="${conv}" style="margin-left:auto;">${State.follows.has(conv)?'Suivi':'Suivre'}</button>
        </div>
        <div class="conv-thread">
          ${messages.map(m => `
            <div class="msg ${m.from==='me'?'me':'them'}">${escapeHtml(m.text)}</div>
            <div class="msg-time" style="--align:${m.from==='me'?'flex-end':'flex-start'};">${timeAgo(m.minutesAgo)}</div>
          `).join('')}
        </div>
        <div class="msg-compose">
          <input type="text" placeholder="Tapez un message…" id="dm-input">
          <button id="dm-send">Envoyer</button>
        </div>
      </div>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════
   PROFILE VIEW
   ════════════════════════════════════════════════════════════ */
function renderProfile(key) {
  const c = CONTRIBUTORS[key];
  if (!c) return '<div class="view-header"><h2>Profil introuvable</h2></div>';

  const isMe = key === ME;
  const isFollowing = State.follows.has(key);
  const userPosts = State.posts.filter(p => p.author === key);
  const followers = isMe ? 247 : Math.floor(Math.random()*500)+50;
  const following = isMe ? State.follows.size : Math.floor(Math.random()*300)+30;

  return `
    <div class="profile-cover"></div>
    <div class="profile-header">
      <div class="profile-av" style="background:${c.avColor};color:#FAF7F2;">${initials(c.name)}</div>
      <div class="profile-actions-row">
        ${isMe ? `
          <button class="btn-ghost" style="background:var(--paper-2);border:1px solid var(--rule);padding:8px 16px;border-radius:999px;font-weight:600;font-size:13px;">Modifier le profil</button>
        ` : `
          <button class="mini-follow ${isFollowing?'following':''}" data-follow="${key}" style="padding:8px 18px;font-size:13px;">${isFollowing?'★ Vous suivez':'+ Suivre'}</button>
          <button class="btn-ghost" style="background:var(--paper-2);border:1px solid var(--rule);padding:8px 16px;border-radius:999px;font-weight:600;font-size:13px;" onclick="openDM('${key}')">Message</button>
        `}
      </div>
      <div class="profile-name-row">
        <div class="profile-name">${escapeHtml(c.name)}</div>
        ${c.verified ? '<span class="badge-verif">✓ Vérifié</span>' : ''}
      </div>
      <div class="profile-handle-line">@${key} · <span style="font-family:monospace;color:var(--forest);">@${key}@community.openfoodfacts.org</span></div>
      <div class="profile-bio-prose">${escapeHtml(c.bio)}</div>
      <div class="profile-meta">
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${escapeHtml(c.city)}</span>
        <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Membre depuis ${c.joined}</span>
        <span>🗣️ ${c.langs.join(', ')}</span>
      </div>
      <div class="profile-stats-row">
        <span><b>${userPosts.length}</b>publications</span>
        <span><b>${following}</b>abonnements</span>
        <span><b>${followers}</b>abonnés</span>
        <span><b>${c.products.toLocaleString('fr-FR')}</b>produits OFF</span>
        <span><b>${c.photos.toLocaleString('fr-FR')}</b>photos</span>
      </div>
    </div>
    <div class="profile-tabs">
      <div class="profile-tab active">Publications</div>
      <div class="profile-tab">Réponses</div>
      <div class="profile-tab">Médias</div>
      <div class="profile-tab">J'aime</div>
    </div>
    <div>
      ${userPosts.length ? userPosts.map(renderPost).join('') : `
        <div style="text-align:center;padding:60px 20px;color:var(--moss);">
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-style:italic;margin-bottom:6px;">Pas encore de publications</div>
          <div style="font-size:13px;">${isMe ? 'Publiez votre première pensée depuis le Fil.' : `${c.name} n'a pas encore publié sur le réseau.`}</div>
        </div>
      `}
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════
   RIGHT RAIL
   ════════════════════════════════════════════════════════════ */
function renderRail() {
  const sugg = Object.entries(CONTRIBUTORS)
    .filter(([k]) => k !== ME && !State.follows.has(k))
    .slice(0, 4);

  return `
    <div class="card">
      <div class="card-title">Tendances · 24h</div>
      <div class="trending">
        ${TRENDING_TAGS.slice(0,5).map(t => `
          <div class="trend" data-hashtag="${t.tag}">
            <div class="trend-tag">#${t.tag}</div>
            <div class="trend-meta">${t.count} publications</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Suggestions</div>
      ${sugg.map(([k,c]) => `
        <div class="suggest-mini">
          <div class="av" style="background:${c.avColor};color:#FAF7F2;">${initials(c.name)}</div>
          <div class="info">
            <div class="nm" data-profile="${k}">${escapeHtml(c.name)}</div>
            <div class="role">${escapeHtml(c.city.split(',')[0])}</div>
          </div>
          <button class="mini-follow" data-follow="${k}">+ Suivre</button>
        </div>
      `).join('')}
    </div>

    <div class="fed-card">
      <div class="eyebrow">⚡ ActivityPub · Fediverse</div>
      <h3>Votre profil est fédéré</h3>
      <p>Suivez et soyez suivi depuis Mastodon, BlueSky (via Bridgy Fed), Pixelfed et toute instance ActivityPub.</p>
      <div class="fed-handle" onclick="copyHandle()">@anna@community.openfoodfacts.org</div>
      <button class="fed-cta" onclick="openFederationPreview()">Voir l'aperçu →</button>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════
   INTERACTIONS WIRING
   ════════════════════════════════════════════════════════════ */
function wireInteractions() {
  // Composer
  const ta = document.getElementById('composer-text');
  if (ta) {
    const btn = document.getElementById('post-btn');
    const cc = document.getElementById('char-count');
    ta.addEventListener('input', () => {
      const len = ta.value.length;
      const remaining = 280 - len;
      cc.textContent = remaining;
      cc.classList.toggle('warn', remaining < 30);
      btn.disabled = len === 0;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    });
    btn.onclick = publishPost;

    document.querySelectorAll('.type-btn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      };
    });
  }

  // Profile clicks
  document.querySelectorAll('[data-profile]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = el.dataset.profile;
      if (key === ME) setView('profile');
      else setView('profile-other', { profile: key });
    });
  });

  // Hashtag clicks
  document.querySelectorAll('[data-hashtag], .tag').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const tag = el.dataset.hashtag || el.dataset.tag;
      setView('feed', { hashtag: tag });
    });
  });

  // Mentions
  document.querySelectorAll('.mention').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = el.dataset.mention;
      if (CONTRIBUTORS[key]) setView('profile-other', { profile: key });
    });
  });

  // Post actions
  document.querySelectorAll('.pa-btn').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(b.dataset.id);
      const act = b.dataset.act;
      if (act === 'like') {
        if (State.likes.has(id)) State.likes.delete(id);
        else State.likes.add(id);
        saveState();
        render();
      } else if (act === 'boost') {
        if (State.boosts.has(id)) State.boosts.delete(id);
        else { State.boosts.add(id); toast('↗ Boosté · partagé avec vos abonnés et sur le Fediverse'); }
        saveState();
        render();
      } else if (act === 'comment') {
        if (State.openComments.has(id)) State.openComments.delete(id);
        else State.openComments.add(id);
        render();
      } else if (act === 'fed') {
        openFederationPreview(id);
      }
    });
  });

  // Reply submit
  document.querySelectorAll('.reply-btn').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(b.dataset.postId);
      const input = document.querySelector(`.reply-input[data-post-id="${id}"]`);
      if (!input?.value.trim()) return;
      addComment(id, input.value.trim());
      input.value = '';
    });
  });
  document.querySelectorAll('.reply-input').forEach(i => {
    i.addEventListener('keydown', e => {
      if (e.key === 'Enter' && i.value.trim()) {
        addComment(parseInt(i.dataset.postId), i.value.trim());
        i.value = '';
      }
    });
  });

  // Follow buttons
  document.querySelectorAll('[data-follow]').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const key = b.dataset.follow;
      toggleFollow(key);
    });
  });

  // Nav
  document.querySelectorAll('nav.left .nav-item[data-view]').forEach(n => {
    n.addEventListener('click', () => setView(n.dataset.view));
  });

  // Trends in rail
  document.querySelectorAll('.trend').forEach(t => {
    t.addEventListener('click', () => setView('feed', { hashtag: t.dataset.hashtag }));
  });
  document.querySelectorAll('.topic-card').forEach(t => {
    t.addEventListener('click', () => setView('feed', { hashtag: t.dataset.hashtag }));
  });

  // DM
  document.querySelectorAll('[data-dm]').forEach(d => {
    d.addEventListener('click', () => { State.selectedDM = d.dataset.dm; render(); });
  });
  const dmSend = document.getElementById('dm-send');
  if (dmSend) {
    dmSend.onclick = () => {
      const inp = document.getElementById('dm-input');
      if (!inp.value.trim()) return;
      SEED_DMS[State.selectedDM].push({ from:'me', minutesAgo:0, text:inp.value.trim() });
      inp.value = '';
      render();
    };
  }
}

/* ════════════════════════════════════════════════════════════
   ACTIONS
   ════════════════════════════════════════════════════════════ */
function publishPost() {
  const ta = document.getElementById('composer-text');
  const type = document.querySelector('.type-btn.active')?.dataset.type || 'thought';
  const text = ta.value.trim();
  if (!text) return;

  const newPost = {
    id: Date.now(),
    author: ME,
    type,
    minutesAgo: 0,
    content: text,
    likes: 0,
    boosts: 0
  };

  State.posts.unshift(newPost);
  saveState();
  ta.value = '';
  ta.style.height = 'auto';
  toast('✓ Publié · relayé sur le Fediverse');
  render();
}

function addComment(postId, text) {
  if (!State.comments[postId]) State.comments[postId] = [];
  State.comments[postId].push({
    author: ME,
    minutesAgo: 0,
    content: text
  });
  saveState();
  render();
}

function toggleFollow(key) {
  if (State.follows.has(key)) {
    State.follows.delete(key);
    toast(`Vous ne suivez plus @${key}`);
  } else {
    State.follows.add(key);
    toast(`✓ Vous suivez maintenant @${key}`);
  }
  saveState();
  render();
}

function clearHashtag() {
  State.selectedHashtag = null;
  render();
}

function markAllRead() {
  State.notifications.forEach(n => n.unread = false);
  saveState();
  document.getElementById('notif-badge').style.display = 'none';
  render();
}

function openDM(key) {
  State.selectedDM = key;
  setView('messages');
}

function copyHandle() {
  navigator.clipboard?.writeText('@anna@community.openfoodfacts.org');
  toast('✓ Handle copié dans le presse-papier');
}

/* ════════════════════════════════════════════════════════════
   FEDERATION PREVIEW (the wow moment)
   ════════════════════════════════════════════════════════════ */
function openFederationPreview(postId) {
  const post = postId ? State.posts.find(p => p.id === postId) : State.posts[0];
  const author = CONTRIBUTORS[post.author];
  const content = post.content.replace(/#(\w+)/g, '<span style="color:var(--terracotta);font-weight:600;">#$1</span>')
                                .replace(/@(\w+)/g, '<span style="color:var(--forest);font-weight:600;">@$1</span>');

  document.getElementById('modal-content').className = 'modal-box lg';
  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-h">Aperçu fédération</div>
    <div class="modal-sub">Voici comment ce post de <b>${escapeHtml(author.name)}</b> apparaît dans le Fediverse — publié <b>une seule fois</b> sur Open Food Facts, propagé partout via ActivityPub.</div>

    <div class="fed-preview">

      <div class="fed-col">
        <div class="fed-col-title"><span class="dot" style="background:var(--forest);"></span>OFF Community (origine)</div>
        <div class="fed-mock off">
          <div class="fed-mock-head">
            <div class="fed-mock-av" style="background:${author.avColor};">${initials(author.name)}</div>
            <div class="fed-mock-meta">
              <b>${escapeHtml(author.name)}</b><br>
              <span class="h">@${post.author}@community.openfoodfacts.org · ${timeAgo(post.minutesAgo)}</span>
            </div>
          </div>
          <div class="fed-mock-body">${content}</div>
          <div class="fed-mock-actions">
            <span>💬 ${(State.comments[post.id]||[]).length}</span>
            <span>↗ ${post.boosts || 0}</span>
            <span>♡ ${post.likes || 0}</span>
          </div>
        </div>
      </div>

      <div class="fed-col">
        <div class="fed-col-title"><span class="dot" style="background:var(--mastodon);"></span>Vu depuis Mastodon</div>
        <div class="fed-mock mastodon">
          <div class="fed-mock-head">
            <div class="fed-mock-av" style="background:${author.avColor};">${initials(author.name)}</div>
            <div class="fed-mock-meta">
              <b>${escapeHtml(author.name)}</b><br>
              <span class="h">@${post.author}@community.openfoodfacts.org</span>
            </div>
          </div>
          <div class="fed-mock-body">${content}</div>
          <div class="fed-mock-actions">
            <span>💬</span>
            <span>🔁 ${Math.floor((post.boosts||0)*0.3)}</span>
            <span>★ ${Math.floor((post.likes||0)*0.4)}</span>
            <span style="margin-left:auto;font-style:italic;">via mastodon.social</span>
          </div>
        </div>
      </div>

      <div class="fed-col">
        <div class="fed-col-title"><span class="dot" style="background:var(--bluesky);"></span>Vu depuis BlueSky</div>
        <div class="fed-mock bluesky">
          <div class="fed-mock-head">
            <div class="fed-mock-av" style="background:${author.avColor};">${initials(author.name)}</div>
            <div class="fed-mock-meta">
              <b>${escapeHtml(author.name)}</b><br>
              <span class="h">@${post.author}.community.openfoodfacts.org.ap.brid.gy</span>
            </div>
          </div>
          <div class="fed-mock-body">${content}</div>
          <div class="fed-mock-actions">
            <span>💬</span>
            <span>↗</span>
            <span>♡ ${Math.floor((post.likes||0)*0.2)}</span>
            <span style="margin-left:auto;font-style:italic;">via Bridgy Fed</span>
          </div>
        </div>
      </div>

    </div>

    <div class="fed-explain">
      <b>Comment ça marche techniquement</b> — Quand un contributeur publie sur Open Food Facts Community, un objet <code style="background:var(--paper);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;">Create Note</code> ActivityPub est envoyé à tous les serveurs distants qui suivent ce compte. Mastodon, Pixelfed, PeerTube reçoivent et rendent le contenu nativement. BlueSky est touché via <a href="https://fed.brid.gy" target="_blank" style="color:var(--terracotta);font-weight:600;">Bridgy Fed</a> qui bridge gratuitement AP ↔ AT Protocol. Les commentaires distants reviennent par l'<i>inbox</i> du contributeur OFF. Tout est signé HTTP Signatures, sécurité garantie.
    </div>

    <div class="modal-actions" style="margin-top:18px;display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn-post" onclick="closeModal()">J'ai compris</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

/* ════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  render();

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });

  // Header me-chip
  document.querySelector('.me-chip').onclick = () => setView('profile');

  // Update notification badge
  const unread = State.notifications.filter(n => n.unread).length;
  document.getElementById('notif-badge').textContent = unread || '';
  if (!unread) document.getElementById('notif-badge').style.display = 'none';
});
</script>
<script src="app.js" defer></script>
